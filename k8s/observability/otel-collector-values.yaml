# Values para el chart open-telemetry/opentelemetry-collector (modo Deployment).
# El API exporta OTLP a este collector; el collector reparte a Prometheus/Tempo/Loki en el clúster.
#
# Servicio resultante (lo usa el API en k8s/deployment.yml):
#   otel-collector-opentelemetry-collector.observability.svc.cluster.local:4317

mode: deployment
replicaCount: 1

# IMPORTANTE: usar la imagen "contrib" (trae los exporters prometheusremotewrite / loki).
image:
  repository: otel/opentelemetry-collector-contrib
command:
  name: otelcol-contrib

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 500m, memory: 512Mi }

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  processors:
    batch: {}
  exporters:
    # MÉTRICAS -> Prometheus (remote write; requiere enableRemoteWriteReceiver en kube-prometheus-stack)
    prometheusremotewrite:
      endpoint: http://kube-prometheus-stack-prometheus.observability.svc:9090/api/v1/write
      resource_to_telemetry_conversion:
        enabled: true
    # TRAZAS -> Tempo
    otlp/tempo:
      endpoint: tempo.observability.svc:4317
      tls:
        insecure: true
    # LOGS -> Loki (endpoint nativo OTLP de Loki 3.x)
    otlphttp/loki:
      endpoint: http://loki.observability.svc:3100/otlp
  service:
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [prometheusremotewrite]
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp/tempo]
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlphttp/loki]
