# Values para el chart grafana/loki (modo SingleBinary, almacenamiento filesystem).
# Recibe logs OTLP desde el collector en http://loki.observability.svc:3100/otlp

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    allow_structured_metadata: true   # necesario para ingesta OTLP
    retention_period: 168h            # 7 días

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
    # storageClassName: managed-csi

# Apagar los componentes del modo microservicios (usamos single binary)
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
chunksCache:
  enabled: false
resultsCache:
  enabled: false
