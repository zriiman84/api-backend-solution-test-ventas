global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'solution-test-ventas'
    environment: 'local'

# Envío de alertas a AlertManager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Reglas de alerta
rule_files:
  - "alert-rules.yml"

scrape_configs:
  # Métricas del API (.NET) reexpuestas por el OpenTelemetry Collector
  - job_name: 'api-solution-test-ventas'
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          service: 'api-solution-test-ventas'

  # Métricas de infraestructura del host (Node Exporter)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'docker-host'

  # AlertManager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # Prometheus se monitorea a sí mismo
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
