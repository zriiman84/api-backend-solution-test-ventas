# Tempo en modo monolítico (todo-en-uno) con almacenamiento local. Suficiente para local.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317   # el collector exporta aquí (tempo:4317)

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h           # retención de trazas en local

# Genera métricas RED a partir de las trazas (service graph + span metrics) y las
# manda a Prometheus vía remote_write — habilita el "Service Map" en Grafana.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
